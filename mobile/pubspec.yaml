name: navratri_event_app
description: Navratri 2024 - Official Event App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.2

  # HTTP & API
  http: ^1.2.1
  dio: ^5.4.3+1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0
  path: ^1.9.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Image
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  google_mlkit_face_detection: ^0.13.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.2.7
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  share_plus: ^10.0.0

  # Icons
  cupertino_icons: ^1.0.8
  razorpay_flutter: ^1.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/animations/
